name: Atualizar Encartes

on:
  schedule:
    # Roda todo dia às 07:00 horário de Brasília (10:00 UTC)
    - cron: "0 10 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

permissions:
  contents: write  # necessário para fazer commit do JSON atualizado

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rodar scraper
        run: python scraper.py

      - name: Commit e push do JSON atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/encartes.json
          git diff --cached --quiet || git commit -m "chore: atualiza encartes $(date +'%Y-%m-%d')"
          git push
